version: '3.8'
services:
  nvh_api:
    build: .
    container_name: nvh_fastapi
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  nvh_dashboard:
    build: .
    container_name: nvh_streamlit
    ports:
      - "8501:8501"
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - nvh_api
